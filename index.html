<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservasi Meja - Restoran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out;
        }
        .animate-scaleIn {
            animation: scaleIn 0.4s ease-out;
        }
        .focus-ring:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(234, 88, 12, 0.3);
            border-color: #ea580c;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-orange-50 to-amber-50 min-h-screen py-8 px-4">
    
    <div class="max-w-lg mx-auto">
        <!-- Header -->
        <div class="text-center mb-8 animate-fadeIn">
            <h1 class="text-4xl font-bold text-orange-600 mb-2">🍽️ Reservasi Meja</h1>
            <p class="text-gray-600">Pesan meja Anda sekarang</p>
        </div>

        <!-- Form Card -->
        <div class="bg-white rounded-2xl shadow-lg p-8 animate-scaleIn">
            <form id="reservationForm" class="space-y-5">
                
                <!-- Nama -->
                <div>
                    <label for="nama" class="block text-sm font-medium text-gray-700 mb-2">
                        Nama Lengkap <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="nama" 
                        name="nama"
                        required
                        class="focus-ring w-full px-4 py-3 border border-gray-300 rounded-lg focus:border-orange-500 transition-colors"
                        placeholder="Masukkan nama Anda"
                    >
                    <p id="error-nama" class="text-red-500 text-sm mt-1 hidden"></p>
                </div>

                <!-- Nomor Telepon -->
                <div>
                    <label for="telepon" class="block text-sm font-medium text-gray-700 mb-2">
                        Nomor Telepon <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="tel" 
                        id="telepon" 
                        name="telepon"
                        required
                        pattern="[0-9]+"
                        class="focus-ring w-full px-4 py-3 border border-gray-300 rounded-lg focus:border-orange-500 transition-colors"
                        placeholder="08xxxxxxxxxx"
                    >
                    <p id="error-telepon" class="text-red-500 text-sm mt-1 hidden"></p>
                </div>

                <!-- Jumlah Tamu -->
                <div>
                    <label for="jumlahTamu" class="block text-sm font-medium text-gray-700 mb-2">
                        Jumlah Tamu <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="number" 
                        id="jumlahTamu" 
                        name="jumlahTamu"
                        required
                        min="1"
                        class="focus-ring w-full px-4 py-3 border border-gray-300 rounded-lg focus:border-orange-500 transition-colors"
                        placeholder="Berapa orang?"
                    >
                    <p id="error-jumlahTamu" class="text-red-500 text-sm mt-1 hidden"></p>
                </div>

                <!-- Tanggal Reservasi -->
                <div>
                    <label for="tanggal" class="block text-sm font-medium text-gray-700 mb-2">
                        Tanggal Reservasi <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="date" 
                        id="tanggal" 
                        name="tanggal"
                        required
                        class="focus-ring w-full px-4 py-3 border border-gray-300 rounded-lg focus:border-orange-500 transition-colors"
                    >
                    <p id="error-tanggal" class="text-red-500 text-sm mt-1 hidden"></p>
                </div>

                <!-- Waktu Reservasi -->
                <div>
                    <label for="waktu" class="block text-sm font-medium text-gray-700 mb-2">
                        Waktu Reservasi <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="time" 
                        id="waktu" 
                        name="waktu"
                        required
                        class="focus-ring w-full px-4 py-3 border border-gray-300 rounded-lg focus:border-orange-500 transition-colors"
                    >
                    <p id="error-waktu" class="text-red-500 text-sm mt-1 hidden"></p>
                </div>

                <!-- Catatan Tambahan -->
                <div>
                    <label for="catatan" class="block text-sm font-medium text-gray-700 mb-2">
                        Catatan Tambahan
                    </label>
                    <textarea 
                        id="catatan" 
                        name="catatan"
                        rows="3"
                        class="focus-ring w-full px-4 py-3 border border-gray-300 rounded-lg focus:border-orange-500 transition-colors resize-none"
                        placeholder="Permintaan khusus (opsional)"
                    ></textarea>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit" 
                    id="submitBtn"
                    class="w-full bg-orange-600 hover:bg-orange-700 text-white font-semibold py-4 rounded-lg transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                >
                    <span id="btnText">Kirim Reservasi</span>
                    <span id="btnLoading" class="hidden">
                        <svg class="animate-spin inline-block w-5 h-5 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Mengirim...
                    </span>
                </button>

            </form>
        </div>

        <!-- Success Message -->
        <div id="successMessage" class="hidden mt-6 bg-green-50 border border-green-200 rounded-2xl p-6 animate-scaleIn">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <svg class="h-8 w-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <div class="ml-4">
                    <h3 class="text-lg font-semibold text-green-800">Reservasi Berhasil!</h3>
                    <p class="text-green-700 mt-1">Terima kasih, kami akan menghubungi Anda segera.</p>
                </div>
            </div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden mt-6 bg-red-50 border border-red-200 rounded-2xl p-6 animate-scaleIn">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <svg class="h-8 w-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <div class="ml-4">
                    <h3 class="text-lg font-semibold text-red-800">Terjadi Kesalahan</h3>
                    <p class="text-red-700 mt-1" id="errorText">Mohon coba lagi nanti.</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ⚠️ GANTI URL INI DENGAN WEB APP URL ANDA
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxyrHjdG8fORl7fZNo3KMzi_IpyMSS2rcQyN607SmFzN-WqjcH0Cm63fYj3iGPmekEcSQ/exec";

        const form = document.getElementById('reservationForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoading = document.getElementById('btnLoading');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        // Set minimum date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('tanggal').setAttribute('min', today);

        // Real-time validation
        const inputs = form.querySelectorAll('input[required], textarea');
        inputs.forEach(input => {
            input.addEventListener('blur', () => validateField(input));
            input.addEventListener('input', () => {
                const errorEl = document.getElementById(`error-${input.name}`);
                if (errorEl && !errorEl.classList.contains('hidden')) {
                    validateField(input);
                }
            });
        });

        function validateField(field) {
            const errorEl = document.getElementById(`error-${field.name}`);
            if (!errorEl) return true;

            let isValid = true;
            let errorMsg = '';

            if (field.name === 'nama') {
                if (!field.value.trim()) {
                    isValid = false;
                    errorMsg = 'Nama wajib diisi';
                }
            }

            if (field.name === 'telepon') {
                const phoneRegex = /^[0-9]+$/;
                if (!field.value.trim()) {
                    isValid = false;
                    errorMsg = 'Nomor telepon wajib diisi';
                } else if (!phoneRegex.test(field.value)) {
                    isValid = false;
                    errorMsg = 'Nomor telepon hanya boleh berisi angka';
                }
            }

            if (field.name === 'jumlahTamu') {
                const jumlah = parseInt(field.value);
                if (!field.value) {
                    isValid = false;
                    errorMsg = 'Jumlah tamu wajib diisi';
                } else if (jumlah < 1) {
                    isValid = false;
                    errorMsg = 'Jumlah tamu minimal 1 orang';
                }
            }

            if (field.name === 'tanggal') {
                const selectedDate = new Date(field.value);
                const todayDate = new Date(today);
                if (!field.value) {
                    isValid = false;
                    errorMsg = 'Tanggal reservasi wajib diisi';
                } else if (selectedDate < todayDate) {
                    isValid = false;
                    errorMsg = 'Tanggal tidak boleh kurang dari hari ini';
                }
            }

            if (field.name === 'waktu') {
                if (!field.value) {
                    isValid = false;
                    errorMsg = 'Waktu reservasi wajib diisi';
                }
            }

            if (isValid) {
                errorEl.classList.add('hidden');
                errorEl.textContent = '';
                field.classList.remove('border-red-500');
            } else {
                errorEl.classList.remove('hidden');
                errorEl.textContent = errorMsg;
                field.classList.add('border-red-500');
            }

            return isValid;
        }

        function validateForm() {
            let isValid = true;
            inputs.forEach(input => {
                if (!validateField(input)) {
                    isValid = false;
                }
            });
            return isValid;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Hide previous messages
            successMessage.classList.add('hidden');
            errorMessage.classList.add('hidden');

            // Validate form
            if (!validateForm()) {
                return;
            }

            // Disable button and show loading
            submitBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            // Prepare data
            const formData = {
                nama: document.getElementById('nama').value.trim(),
                telepon: document.getElementById('telepon').value.trim(),
                jumlahTamu: document.getElementById('jumlahTamu').value,
                tanggal: document.getElementById('tanggal').value,
                waktu: document.getElementById('waktu').value,
                catatan: document.getElementById('catatan').value.trim()
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                // Show success message
                successMessage.classList.remove('hidden');
                successMessage.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                // Reset form
                form.reset();

                // Hide success message after 5 seconds
                setTimeout(() => {
                    successMessage.classList.add('hidden');
                }, 5000);

            } catch (error) {
                console.error('Error:', error);
                errorText.textContent = 'Terjadi kesalahan saat mengirim data. Mohon coba lagi.';
                errorMessage.classList.remove('hidden');
                errorMessage.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } finally {
                // Re-enable button
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });
    </script>

</body>
</html>
